<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeNest - Welcome</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/?size=32&id=jS5mnk7bZNpi&format=png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://img.icons8.com/?size=16&id=jS5mnk7bZNpi&format=png">
    <link rel="shortcut icon" type="image/png" href="https://img.icons8.com/?size=32&id=jS5mnk7bZNpi&format=png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-screen welcome-screen-standalone">
        <div class="welcome-bg-glow welcome-glow-1"></div>
        <div class="welcome-bg-glow welcome-glow-2"></div>
        <div class="welcome-bg-glow welcome-glow-3"></div>

        <div class="welcome-floating-emojis" aria-hidden="true">
            <span class="w-float-emoji w-emoji-1">😊</span>
            <span class="w-float-emoji w-emoji-2">🤗</span>
            <span class="w-float-emoji w-emoji-3">🧭</span>
            <span class="w-float-emoji w-emoji-4">💕</span>
        </div>

        <div class="welcome-content">
            <div class="welcome-logo-wrapper">
                <div class="welcome-logo-circle"></div>
                <img src="assets/hope.png" class="welcome-logo-img" alt="VibeNest logo">
            </div>

            <h1 class="welcome-title">
                Vibe<span class="welcome-highlight">Nest</span>
            </h1>

            <p class="welcome-tagline">
                Shop For The Mood You're In
            </p>

            <div class="welcome-mood-pills">
                <span class="w-pill w-pill-happy">😊 Happy</span>
                <span class="w-pill w-pill-comfort">🤗 Comfort</span>
                <span class="w-pill w-pill-adventure">🧭 Adventure</span>
                <span class="w-pill w-pill-romantic">💕 Romantic</span>
            </div>

            <a href="home.html" class="welcome-enter-btn">
                Enter VibeNest
            </a>

            <div class="welcome-loader" aria-hidden="true">
                <div class="welcome-loader-bar"></div>
            </div>
        </div>
    </div>
</body>
</html>
